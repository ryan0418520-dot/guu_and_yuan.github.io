<!DOCTYPE html>
<meta lang="zh">

<head>
    <title>guu app</title>
</head>
<body>
    <h1>hello</h1>
    <input  type="checkbox">
    <label for="date1">輸入生日</label>
    <input type="date" id="date1"><br>

<input type="range" id="slider" min="0" max="100" step="10" value="50">
<span id="value">50</span>

<script>
const slider = document.getElementById("slider")
const valueDisplay = document.getElementById("value")

// 即時顯示滑條數值
slider.oninput = () => valueDisplay.textContent = slider.value
</script>

</body>
